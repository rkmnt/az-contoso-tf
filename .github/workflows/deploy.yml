name: Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      spoke:
        description: 'Spoke to deploy (e.g. spoke1, spoke2)'
        required: true
        default: 'spoke1'
      environment:
        description: 'Environment to deploy (e.g. dev, prod)'
        required: true
        default: 'dev'
      modules:
        description: 'Modules to deploy in order (JSON array, e.g. ["networking","aks","db"])'
        required: true
        default: '["networking","aks","db"]'

env:
  SPOKE: ${{ inputs.spoke || 'spoke1' }}
  ENVIRONMENT: ${{ inputs.environment || 'dev' }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
  TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}

jobs:
  setup:
    name: Setup matrix
    runs-on: [self-hosted, Linux, X64]
    outputs:
      modules: ${{ steps.matrix.outputs.modules }}
    steps:
      - id: matrix
        env:
          INPUT_MODULES: ${{ inputs.modules || '["networking","aks","db"]' }}
        run: echo "modules=$INPUT_MODULES" >> $GITHUB_OUTPUT

  plan:
    name: Plan / ${{ matrix.module }}
    runs-on: [self-hosted, Linux, X64]
    needs: setup
    strategy:
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: |
          terraform init -backend=false
          terraform validate

      - name: Init
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Plan
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.SPOKE }}-${{ matrix.module }}-${{ env.ENVIRONMENT }}
          path: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}/tfplan

  apply:
    name: Apply / ${{ matrix.module }}
    runs-on: [self-hosted, Linux, X64]
    needs: [setup, plan]
    environment: production
    strategy:
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.SPOKE }}-${{ matrix.module }}-${{ env.ENVIRONMENT }}
          path: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}

      - name: Init
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Apply
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: terraform apply -auto-approve tfplan
