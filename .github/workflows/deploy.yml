name: Infrastructure Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      spoke:
        description: 'Spoke to deploy (e.g. spoke1, spoke2)'
        required: true
        default: 'spoke1'
      environment:
        description: 'Environment to deploy (e.g. dev, prod)'
        required: true
        default: 'dev'
      modules:
        description: 'Modules to deploy in order (JSON array, e.g. ["networking","aks","db"])'
        required: true
        default: '["networking","aks","db"]'

env:
  SPOKE: ${{ inputs.spoke || 'spoke1' }}
  ENVIRONMENT: ${{ inputs.environment || 'dev' }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
  TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}

jobs:
  setup:
    name: Setup matrix
    runs-on: github-runner-personal
    outputs:
      modules: ${{ steps.matrix.outputs.modules }}
    steps:
      - id: matrix
        run: echo "modules=${{ inputs.modules || '[\"networking\",\"aks\",\"db\"]' }}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy / ${{ matrix.module }}
    runs-on: github-runner-personal
    needs: setup
    strategy:
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: |
          terraform init -backend=false
          terraform validate

      - name: Init
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Plan
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: terraform plan -out=tfplan

      - name: Apply
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: terraform apply -auto-approve tfplan
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
