name: Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      spoke:
        description: 'Spoke to deploy (e.g. spoke1, spoke2)'
        required: true
        default: 'spoke1'
      environment:
        description: 'Environment to deploy (e.g. dev, prod)'
        required: true
        default: 'dev'
      modules:
        description: 'Modules to deploy in order (JSON array, e.g. ["networking","aks","db"])'
        required: true
        default: '["networking","aks","db"]'

env:
  SPOKE: ${{ inputs.spoke || 'spoke1' }}
  ENVIRONMENT: ${{ inputs.environment || 'dev' }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
  TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}

jobs:
  validate:
    name: Validate
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate networking
        working-directory: ${{ env.SPOKE }}/networking/${{ env.ENVIRONMENT }}
        run: |
          terraform init
          terraform validate

      - name: Validate aks
        working-directory: ${{ env.SPOKE }}/aks/${{ env.ENVIRONMENT }}
        run: |
          terraform init
          terraform validate

      - name: Validate db
        working-directory: ${{ env.SPOKE }}/db/${{ env.ENVIRONMENT }}
        run: |
          terraform init
          terraform validate

  deploy:
    name: Deploy / ${{ matrix.module }}
    runs-on: [self-hosted, Linux, X64]
    needs: validate
    strategy:
      matrix:
        module: ${{ fromJson(inputs.modules) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Init
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Apply
        working-directory: ${{ env.SPOKE }}/${{ matrix.module }}/${{ env.ENVIRONMENT }}
        run: terraform apply -auto-approve
